services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: rushpredmkt
      POSTGRES_USER: rush
      POSTGRES_PASSWORD: rush
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rush -d rushpredmkt"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
